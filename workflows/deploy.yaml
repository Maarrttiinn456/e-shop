name: Deploy Next.js to Hetzner

on:
    push:
        branches: [main] # Spustí se při pushi do hlavní větve

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        # ... začátek stejný jako minule ...

    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        # TOTO JE DŮLEŽITÉ: Příprava pro ARM64 build
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to the Container registry
          uses: docker/login-action@v3
          with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
              context: .
              push: true
              platforms: linux/arm64 # TADY říkáme, že chceme ARM verzi pro Hetzner
              tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      # Přihlášení do registru na serveru
                      echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      # Stažení nové verze
                      docker pull ghcr.io/${{ github.repository }}:latest
                      # Zastavení a smazání starého kontejneru
                      docker stop web-app || true
                      docker rm web-app || true
                      # Spuštění nové verze
                      docker run -d \
                        --name web-app \
                        --restart always \
                        -p 80:3000 \
                        ghcr.io/${{ github.repository }}:latest
