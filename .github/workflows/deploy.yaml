name: Deploy Next.js Eshop (SSR)

on:
    push:
        branches:
            - main # Zkontroluj, zda se tvá hlavní větev jmenuje main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            # 1. Stažení kódu
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2. Nastavení Node.js (v22 pro moderní Next.js)
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            # 3. Instalace závislostí a Build
            - name: Install dependencies
              run: npm ci

            - name: Build Next.js project
              run: npm run build

            # 4. Synchronizace souborů na server (vše kromě node_modules a gitu)
            - name: Deploy to Server via SSH
              uses: easingthemes/ssh-deploy@main
              with:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  REMOTE_HOST: ${{ secrets.SERVER_IP }}
                  REMOTE_USER: ${{ secrets.SERVER_USER }}
                  SOURCE: './'
                  TARGET: '/var/www/eshop/'
                  ARGS: "-rlgoDzvc -i --delete --exclude='node_modules' --exclude='.git' --exclude='.github'"

            # 5. Restartování aplikace přes PM2 na serveru
            - name: SSH Remote Commands (Restart PM2)
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd /var/www/eshop
                      # Instalace pouze produkčních balíčků přímo na serveru
                      npm install --production
                      # Restartování procesu v PM2, nebo jeho spuštění pokud ještě neběží
                      pm2 restart eshop || pm2 start npm --name "eshop" -- start
                      # Uložení stavu PM2 pro případ restartu celého VPS
                      pm2 save
