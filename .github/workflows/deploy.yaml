name: Deploy Next.js to Hetzner

on:
    push:
        branches: [main]

env:
    REGISTRY: ghcr.io
    # Tady už nedefinujeme IMAGE_NAME napevno, protože ho změníme v kroku níže

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # TENTO KROK OPRAVUJE TVOJI CHYBU: Převede název na malá písmena
            - name: Lowercase repo name
              run: |
                  echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  platforms: linux/arm64
                  # Používáme tu proměnnou, kterou jsme si "zmalopísmenkovali"
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Lowercase repo name
              run: |
                  echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}

            - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HOST }}
                  username: ${{ secrets.USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      docker stop web-app || true
                      docker rm web-app || true
                      docker run -d \
                        --name web-app \
                        --restart always \
                        -p 80:3000 \
                        ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
